{{ define "page" }}
  {{ $terms := .Data.Terms.Alphabetical }}
  <article>
    <header>
      <h1>{{ .Title }}</h1>
    </header>
    <p class="home-tags-inline terms-inline">
      {{ range $terms }}
        <span><a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a> <span class="meta-inline">{{ .Count }}</span></span>
      {{ end }}
    </p>
  </article>
{{ end }}
