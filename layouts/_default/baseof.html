<!doctype html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <nav>
    {{ range .Site.Menus.nav }}
      <a href="{{ .URL | safeURL }}" {{ if .Identifier }}id="{{ .Identifier }}"{{ end }}>{{ .Name }}</a>
    {{ end }}
  </nav>
  <main>
    {{ block "page" . }}{{ end }}
  </main>
</body>
</html>
