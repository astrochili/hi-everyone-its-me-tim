<!doctype html>
<html lang="en">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <nav>
    {{ range .Site.Menus.nav }}
      <a href="{{ .URL | safeURL }}" {{ if .Identifier }}id="{{ .Identifier }}"{{ end }}>{{ .Name }}</a>
    {{ end }}
  </nav>
  <main>
    <article>
      <header>
        <h1>404</h1>
        <p>This page does not exist in the archive.</p>
      </header>
      <p><a href="{{ .Site.BaseURL }}">Return home</a></p>
    </article>
  </main>
</body>
</html>
